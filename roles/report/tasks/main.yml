---
- name: Samla MAC-adress för det interface som kopplar mot nätverket
  shell: |
    # Använd interfacet med default-route — det är det ISE autentiserar.
    # Undviker fel MAC vid laptops med både WiFi och Ethernet.
    IFACE=$(ip route show default | awk 'NR==1 {for(i=1;i<=NF;i++) if($i=="dev") print $(i+1)}')
    if [ -z "$IFACE" ]; then
      # Fallback: första ethernet-interface om ingen default-route finns
      IFACE=$(ip -j link show | python3 -c "
    import json,sys
    links=json.load(sys.stdin)
    for l in links:
        if l.get('link_type')=='ether' and 'lo' not in l['ifname']:
            print(l['ifname']); break
    ")
    fi
    cat /sys/class/net/${IFACE}/address
  register: mac_address
  changed_when: false

- name: Bygg compliance-rapport
  set_fact:
    compliance_report:
      schema_version: "1"
      hostname: "{{ ansible_hostname }}"
      fqdn: "{{ ansible_fqdn }}"
      timestamp: "{{ ansible_date_time.iso8601 }}"
      mac_address: "{{ mac_address.stdout | trim }}"
      emergency: "{{ compliance_emergency | default(false) | bool }}"
      os:
        distribution: "{{ ansible_distribution }}"
        version: "{{ ansible_distribution_version }}"
        kernel: "{{ ansible_kernel }}"
      oscap:
        score: "{{ oscap_results.score }}"
        pass: "{{ oscap_results.pass }}"
        fail: "{{ oscap_results.fail }}"
        notapplicable: "{{ oscap_results.notapplicable }}"
        high_severity_failures: "{{ oscap_results.high_severity_failures }}"
        failed_rules: "{{ oscap_results.failed_rules }}"
      security_checks: "{{ security_checks }}"
      compliant: >-
        {{
          not (compliance_emergency | default(false) | bool) and
          oscap_results.high_severity_failures == 0 and
          security_checks.auditd_running and
          security_checks.selinux_enforcing and
          security_checks.rsyslog_running and
          security_checks.rsyslog_forwarding_configured and
          security_checks.timer_intact
        }}

- name: Skriv rapport till disk
  copy:
    content: "{{ compliance_report | to_nice_json }}"
    dest: /tmp/compliance-report.json
    mode: '0600'

- name: Pusha rapport till S3
  command: >
    aws s3 cp /tmp/compliance-report.json
    s3://{{ s3_bucket }}/compliance/{{ ansible_hostname }}/latest.json
    {% if s3_endpoint_url is defined %}--endpoint-url {{ s3_endpoint_url }}{% endif %}
    {% if s3_sse | default(true) | bool %}--sse aws:kms{% endif %}
  environment:
    AWS_ACCESS_KEY_ID: "{{ s3_access_key | default(omit) }}"
    AWS_SECRET_ACCESS_KEY: "{{ s3_secret_key | default(omit) }}"
  register: s3_push
  retries: 3
  delay: 15
  until: s3_push.rc == 0
  failed_when: false  # Logga fel men stoppa inte körningen

- name: Varna om S3-push misslyckades efter alla försök
  debug:
    msg: "VARNING: Kunde inte pusha rapport till S3 efter 3 försök: {{ s3_push.stderr }}"
  when: s3_push.rc != 0
