ise:
  host: ise.example.com
  username: compliance-svc
  password: "${ISE_PASSWORD}"   # Sätt via miljövariabel eller secrets manager
  verify_ssl: true

s3:
  bucket: ditt-compliance-bucket
  prefix: compliance/

evaluation:
  max_report_age_minutes: 120   # Rapport äldre än detta = karantän (klienten tyst)
                                # Bör vara minst 4× ansible-pull-intervallet (4×30=120 min)
                                # för att tolerera enstaka S3-avbrott
  grace_period_minutes: 40      # Klient får X min efter autentisering innan rapport krävs
                                # Bör matcha ansible-pull-intervallet + marginal (30+10=40 min)
                                # Viktigt för laptops som vaknar ur sleep och re-autentiseras
  quarantine_policy: Quarantine # ANC-policyns namn i ISE

# PostgreSQL för Grafana-visualisering (valfritt - utelämna för att hoppa över)
database:
  dsn: "postgresql://compliance:LÖSENORD@localhost/compliance"

# Sätt till true för att testa utan att faktiskt karantänera
dry_run: false
